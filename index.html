<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YUME</title>
    <style>
        /* FONDO NEGRO TOTAL */
        body {
            background-color: #000000 !important;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* TEXTOS CENTRALES EXACTOS A LA FOTO */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .yume-logo {
            font-size: 75px;
            font-weight: bold;
            color: #ff007f;
            text-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f;
            margin: 0;
            letter-spacing: 2px;
        }

        .padre-text {
            font-size: 24px;
            margin: 10px 0;
            color: #ffffff;
        }

        .status-blue {
            font-size: 32px;
            font-weight: bold;
            color: #00d4ff;
            text-shadow: 0 0 15px #00d4ff;
            margin: 10px 0;
            text-transform: uppercase;
        }

        .web-label {
            color: #00ff88;
            font-size: 18px;
            margin-bottom: 40px;
        }

        .thinking {
            color: #333333;
            font-size: 22px;
        }

        /* BARRA DE CHAT INFERIOR (ESTILO PÍLDORA) */
        .footer {
            padding: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .input-container {
            width: 95%;
            background: #111111;
            border-radius: 40px;
            border: 1px solid #222;
            padding: 5px 5px 5px 25px;
            display: flex;
            align-items: center;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            outline: none;
        }

        /* BOTÓN ENVIAR CIAN REDONDEADO */
        .btn-enviar {
            background-color: #00d4ff;
            color: #000000;
            border: none;
            padding: 12px 30px;
            border-radius: 35px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <h1 class="yume-logo">YUME</h1>
        <p class="padre-text">Hola, Padre.</p>
        <div class="status-blue">SISTEMA ACTIVO</div>
        <p class="web-label">[ Conectado página web ]</p>
        <div class="thinking">Pensando...</div>
    </div>

    <div class="footer">
        <div class="input-container">
            <input type="text" placeholder="¿Qué necesitas hoy?">
            <button class="btn-enviar">ENVIAR</button>
        </div>
    </div>

</body>
</html>
