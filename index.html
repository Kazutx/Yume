<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YUME</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Centro de la pantalla */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding-bottom: 20px;
        }

        .yume-logo {
            font-size: 70px;
            font-weight: bold;
            color: #ff007f;
            text-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f;
            margin: 0;
        }

        .padre-text { font-size: 22px; margin: 10px 0; }

        .status-blue {
            font-size: 30px;
            font-weight: bold;
            color: #00d4ff;
            text-shadow: 0 0 15px #00d4ff;
            margin: 5px 0;
            text-transform: uppercase;
        }

        .web-label { color: #00ff88; font-size: 16px; margin-bottom: 30px; }

        .thinking { color: #333333; font-size: 20px; }

        /* ARREGLO DE LA BARRA INFERIOR */
        .footer {
            width: 100%;
            padding: 15px 15px 35px 15px; /* Más espacio abajo para que no se corte */
            display: flex;
            justify-content: center;
            background: #000;
            box-sizing: border-box;
        }

        .input-container {
            width: 100%;
            max-width: 450px;
            background: #111111;
            border-radius: 40px;
            border: 1px solid #222;
            padding: 5px 5px 5px 20px;
            display: flex;
            align-items: center;
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 17px;
            outline: none;
            padding: 10px 0;
        }

        .btn-enviar {
            background-color: #00d4ff;
            color: #000000;
            border: none;
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            margin-left: 5px;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <h1 class="yume-logo">YUME</h1>
        <p class="padre-text">Hola, Padre.</p>
        <div class="status-blue">SISTEMA ACTIVO</div>
        <p class="web-label">[ Conectado página web ]</p>
        <div class="thinking">Pensando...</div>
    </div>

    <div class="footer">
        <div class="input-container">
            <input type="text" placeholder="¿Qué necesitas hoy?">
            <button class="btn-enviar">ENVIAR</button>
        </div>
    </div>

</body>
</html>
