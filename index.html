<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yume Project</title>
    <style>
        body { background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .login-box { text-align: center; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; backdrop-filter: blur(20px); border: 1px solid #ff007f; box-shadow: 0 0 30px rgba(255, 0, 127, 0.4); width: 85%; }
        h2 { color: #ff007f; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 5px; font-size: 2.2rem; text-shadow: 0 0 10px #ff007f; }
        p { font-size: 0.9rem; letter-spacing: 1px; margin-bottom: 25px; }
        input { padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.6); color: white; margin-top: 10px; width: 90%; font-size: 16px; outline: none; text-align: center; transition: 0.3s; }
        input:focus { border-color: #00d4ff; box-shadow: 0 0 10px rgba(0, 212, 255, 0.5); }
        button { background: linear-gradient(45deg, #ff007f, #ff5e62); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; margin-top: 25px; width: 100%; font-weight: bold; font-size: 18px; transition: 0.3s; box-shadow: 0 4px 15px rgba(255, 0, 127, 0.3); }
        button:active { transform: scale(0.95); }
        #app { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; background: #12141d; position: relative; }
    </style>
</head>
<body>

    <div id="login" class="login-box">
        <h2>YUME</h2>
        <p style="opacity: 0.6; color: #00d4ff;">ACCESO RESTRINGIDO AL CREADOR</p>
        <input type="password" id="pass" placeholder="Ingresa tu clave secreta">
        <button onclick="verificar()">INICIAR CONEXIÓN</button>
    </div>

    <div id="app">
        <div style="text-align: center; padding: 20px;">
            <h1 style="color: #ff007f; font-size: 2.5rem; margin-bottom: 5px; text-shadow: 0 0 15px #ff007f;">YUME</h1>
            <p style="color: #00d4ff;">SISTEMA OPERATIVO ACTIVO</p>
        </div>
        
        <div id="status" style="font-size: 1.1rem; opacity: 0.9; color: #fff; text-align: center; padding: 20px; line-height: 1.6;">
            Hola, Padre. <br> 
            <span style="font-size: 0.8rem; color: #00ff88;">[ Conectado desde Tecno Spark Go 2024 ]</span> <br><br>
            Esperando órdenes...
        </div>

        <div style="position: absolute; bottom: 30px; width: 90%; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center;">
            <input type="text" placeholder="¿Qué necesitas hoy?" style="flex-grow: 1; margin: 0; background: transparent; border: none; text-align: left; padding-left: 10px; width: 70%;">
            <button style="width: auto; margin: 0; padding: 10px 15px; font-size: 14px; border-radius: 12px; background: #00d4ff; color: #000;">ENVIAR</button>
        </div>
    </div>

    <script>
        function verificar() {
            const claveInput = document.getElementById('pass').value;
            // TU NUEVA CLAVE: Yume2841
            if (claveInput === "Yume2841") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                alert("Protocolo Yume activado. Bienvenido, Creador.");
            } else {
                alert("Clave incorrecta. Acceso denegado.");
                document.getElementById('pass').value = "";
            }
        }
    </script>
</body>
</html>
