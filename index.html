<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YUME - Sistema Inteligente</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: black;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* --- INTERFAZ 1: ENTRADA (CHAT) --- */
        #pantalla-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            width: 100%;
            position: absolute;
            z-index: 2;
            transition: transform 0.5s ease-in-out;
        }

        .yume-logo {
            font-size: 4.5rem;
            color: #ff007f;
            text-shadow: 0 0 25px #ff007f;
            margin: 0;
            font-weight: bold;
        }

        .hola-padre { font-size: 1.5rem; color: white; margin: 10px 0; }

        .sistema-activo {
            color: #00d4ff;
            font-size: 1.8rem;
            text-shadow: 0 0 15px #00d4ff;
            font-weight: bold;
            margin-top: 20px;
        }

        .conectado { color: #00ff88; font-size: 1rem; margin-top: 10px; }

        /* Barra de Chat Estilo App */
        .input-box {
            position: absolute;
            bottom: 30px;
            width: 90%;
            background: rgba(255,255,255,0.1);
            border-radius: 50px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }

        .input-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 16px;
            outline: none;
        }

        /* EL BOTÓN AZUL QUE PEDISTE */
        .btn-azul {
            background: #00d4ff;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px #00d4ff;
            cursor: pointer;
        }

        /* --- INTERFAZ 2: VISIÓN (CÁMARA) --- */
        #pantalla-vision {
            display: none; /* Oculta al principio */
            flex-direction: column;
            align-items: center;
            height: 100%;
            width: 100%;
            background: black;
            position: absolute;
            z-index: 3;
        }

        .yume-small {
            color: #ff007f;
            font-size: 2rem;
            margin-top: 20px;
            text-shadow: 0 0 10px #ff007f;
        }

        /* CUADRO DE CÁMARA GRANDE Y SEPARADO */
        .cam-frame {
            width: 90%;
            flex-grow: 0.8;
            margin: 20px 0;
            border: 2px solid #00d4ff;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            background: #111;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* Botón para volver atrás (Cerrar Cámara) */
        .btn-cerrar {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #00d4ff;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

    </style>
</head>
<body>

    <div id="pantalla-chat">
        <h1 class="yume-logo">YUME</h1>
        <p class="hola-padre">Hola, Padre.</p>
        
        <div class="sistema-activo">SISTEMA ACTIVO</div>
        <p class="conectado">[ Conectado página web ]</p>

        <div class="input-box">
            <input type="text" placeholder="¿Qué necesitas hoy?">
            <button class="btn-azul" onclick="abrirVision()">
                <i class="material-icons-round" style="color: black;">visibility</i>
            </button>
        </div>
    </div>

    <div id="pantalla-vision">
        <h2 class="yume-small">YUME</h2>
        <div style="color: white; opacity: 0.7;">[ Escuchando ]</div>
        
        <div class="cam-frame">
            <video id="webcam" autoplay playsinline></video>
        </div>

        <button class="btn-cerrar" onclick="cerrarVision()">
            <i class="material-icons-round">close</i>
        </button>
    </div>

    <script>
        const chat = document.getElementById('pantalla-chat');
        const vision = document.getElementById('pantalla-vision');
        const video = document.getElementById('webcam');
        let stream = null;

        async function abrirVision() {
            // Animación para quitar la primera interfaz
            chat.style.transform = 'translateY(-100%)';
            setTimeout(async () => {
                chat.style.display = 'none';
                vision.style.display = 'flex';
                
                // Iniciar cámara
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    video.srcObject = stream;
                } catch (e) {
                    alert("Error al abrir cámara");
                }
            }, 500);
        }

        function cerrarVision() {
            // Volver a la primera interfaz
            location.reload(); // Recarga para limpiar todo y volver al inicio
        }
    </script>
</body>
</html>
