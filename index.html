<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YUME</title>
    <style>
        body, html {
            background-color: #000;
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            display: flex; flex-direction: column;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Pantalla de Bloqueo */
        #lock-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .lock-input {
            background: #111; border: 1px solid #ff007f;
            color: #fff; padding: 12px; border-radius: 10px;
            text-align: center; font-size: 18px; outline: none; margin-bottom: 15px;
        }

        /* Interfaz Principal */
        #main-ui {
            display: none;
            flex-direction: column;
            height: 100%; width: 100%;
        }

        /* YUME EN EL MEDIO */
        .center-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .yume-logo {
            font-size: 70px;
            font-weight: bold;
            color: #ff007f;
            text-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f;
            margin: 0;
        }

        /* BARRA DE ESCRIBIR (SIN CAMBIOS) */
        .footer {
            width: 100%;
            padding-bottom: 60px; /* Altura ideal para tu Tecno */
            display: flex; justify-content: center;
        }
        .pill-container {
            width: 90%; max-width: 400px;
            background: #151515; border-radius: 40px;
            border: 1px solid #222;
            padding: 5px 5px 5px 18px;
            display: flex; align-items: center;
        }
        input {
            flex: 1; background: transparent; border: none;
            color: #fff; font-size: 16px; outline: none;
        }
        .btn-enviar {
            background-color: #00d4ff; color: #000;
            border: none; padding: 10px 20px;
            border-radius: 30px; font-weight: bold;
            text-transform: uppercase; font-size: 12px;
        }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 style="color:#ff007f; text-shadow: 0 0 10px #ff007f;">YUME</h1>
        <input type="password" id="pass" class="lock-input" placeholder="Contraseña">
        <button class="btn-enviar" onclick="login()">ENTRAR</button>
    </div>

    <div id="main-ui">
        <div class="center-content">
            <h1 class="yume-logo">YUME</h1>
        </div>

        <div class="footer">
            <div class="pill-container">
                <input type="text" placeholder="¿Qué necesitas hoy?">
                <button class="btn-enviar">ENVIAR</button>
            </div>
        </div>
    </div>

    <script>
        function login() {
            if(document.getElementById('pass').value === "Yume2841") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'flex';
            } else {
                alert("Incorrecto");
            }
        }
    </script>
</body>
</html>
