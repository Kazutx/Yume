<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yume Project</title>
    <style>
        body { background: #0b0e14; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .login-box { text-align: center; background: rgba(255,255,255,0.05); padding: 40px; border-radius: 30px; backdrop-filter: blur(15px); border: 1px solid #ff007f; box-shadow: 0 0 25px rgba(255, 0, 127, 0.3); width: 85%; }
        h2 { color: #ff007f; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 3px; font-size: 2rem; }
        input { padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.5); color: white; margin-top: 10px; width: 90%; font-size: 16px; outline: none; text-align: center; }
        button { background: linear-gradient(45deg, #ff007f, #ff5e62); color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; margin-top: 25px; width: 100%; font-weight: bold; font-size: 18px; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        #app { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; background: #12141d; }
    </style>
</head>
<body>

    <div id="login" class="login-box">
        <h2>YUME</h2>
        <p style="opacity: 0.6;">SISTEMA PRIVADO</p>
        <input type="password" id="pass" placeholder="Clave del Creador">
        <button onclick="verificar()">INICIAR CONEXIÓN</button>
    </div>

    <div id="app">
        <div style="text-align: center; padding: 20px;">
            <h1 style="color: #ff007f; font-size: 2.5rem; margin-bottom: 5px;">YUME</h1>
            <p style="color: #00d4ff;">SISTEMA OPERATIVO ONLINE</p>
        </div>
        
        <div id="status" style="font-size: 1rem; opacity: 0.8; color: #fff; text-align: center;">
            Hola, Padre. <br> Esperando órdenes en tu Tecno Spark...
        </div>

        <div style="position: absolute; bottom: 30px; width: 90%; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex;">
            <input type="text" placeholder="Mensaje..." style="flex-grow: 1; margin: 0; background: transparent; border: none; text-align: left; padding-left: 10px;">
            <button style="width: auto; margin: 0; padding: 10px 20px; font-size: 14px; border-radius: 12px;">ENVIAR</button>
        </div>
    </div>

    <script>
        function verificar() {
            const clave = document.getElementById('pass').value;
            // TU CLAVE SECRETA ES: 1234
            if (clave === "1234") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('app').style.display = 'flex';
                alert("Protocolo Yume activado. Bienvenido, Creador.");
            } else {
                alert("Acceso denegado. Intento registrado.");
            }
        }
    </script>
</body>
</html>
