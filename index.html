<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YUME - Sistema Integrado</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --neon-pink: #ff007f;
            --neon-cyan: #00d4ff;
            --bg-black: #000000;
        }

        body { 
            background-color: var(--bg-black); 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
        }

        /* --- MODO CHAT --- */
        #chat-interface {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-bottom: 120px; /* Espacio para no chocar con botones */
        }

        h1 { 
            font-size: 4rem; 
            color: var(--neon-pink); 
            text-shadow: 0 0 20px var(--neon-pink); 
            margin: 0; 
        }

        .status-box { text-align: center; margin-top: 10px; }
        .status-main { color: var(--neon-cyan); font-weight: bold; font-size: 1.5rem; text-shadow: 0 0 10px var(--neon-cyan); }
        .status-sub { color: #00ff88; font-size: 0.9rem; display: block; margin-top: 5px; }

        /* Barra de Chat Flotante */
        .chat-container {
            position: absolute;
            bottom: 130px; /* Arriba de los botones principales */
            width: 90%;
            left: 5%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: flex;
            align-items: center;
            padding: 5px 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px;
            outline: none;
            font-size: 16px;
        }

        /* Botoncito Azul de Enviar / Cambio */
        .btn-send {
            background: var(--neon-cyan);
            color: black;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        /* --- MODO VISIÓN --- */
        #vision-interface {
            display: none;
            height: 100%;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .camera-box {
            width: 90%;
            flex: 0.85; /* Cuadro largo */
            border: 2px solid var(--neon-cyan);
            border-radius: 25px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.4);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        /* --- BARRA INFERIOR DE BOTONES --- */
        .nav-bar {
            position: absolute;
            bottom: 25px;
            width: 90%;
            left: 5%;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: rgba(20, 20, 20, 0.8);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid var(--neon-cyan);
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
        }

        .nav-btn.active { border-color: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }
        .nav-btn i { font-size: 30px; color: white; }

    </style>
</head>
<body>

    <div id="chat-interface">
        <h1>YUME</h1>
        <p>Hola, Padre.</p>
        <div class="status-box">
            <span class="status-main">SISTEMA ACTIVO</span>
            <span class="status-sub">[ Conectado página web ]</span>
        </div>
        
        <div class="chat-container">
            <input type="text" class="chat-input" placeholder="¿Qué necesitas hoy?">
            <button class="btn-send" onclick="toggleInterface()">
                <i class="material-icons">send</i>
            </button>
        </div>
    </div>

    <div id="vision-interface">
        <h1 style="font-size: 2rem;">YUME</h1>
        <div class="camera-box">
            <video id="webcam" autoplay playsinline></video>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn" onclick="location.reload()"><i class="material-icons">chat</i></div>
        <div class="nav-btn active" onclick="toggleInterface()"><i class="material-icons">visibility</i></div>
        <div class="nav-btn"><i class="material-icons">settings</i></div>
        <div class="nav-btn"><i class="material-icons">power_settings_new</i></div>
    </div>

    <script>
        let stream = null;
        async function toggleInterface() {
            const chat = document.getElementById('chat-interface');
            const vision = document.getElementById('vision-interface');
            const video = document.getElementById('webcam');

            if (chat.style.display !== 'none') {
                chat.style.display = 'none';
                vision.style.display = 'flex';
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                    video.srcObject = stream;
                } catch (e) { alert("Error de cámara"); }
            } else {
                location.reload();
            }
        }
    </script>
</body>
</html>
