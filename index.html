<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YUME - Sistema AI</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #000; color: #fff; margin: 0; 
            font-family: 'Segoe UI', sans-serif; height: 100vh; 
            display: flex; flex-direction: column; overflow: hidden; 
        }

        /* Cabecera */
        .header { text-align: center; padding-top: 15px; }
        .title { color: #ff007f; font-size: 2.8rem; text-shadow: 0 0 15px #ff007f; margin: 0; font-weight: bold; letter-spacing: 2px; }

        /* Círculo de Voz / Onda */
        .vision-circle {
            display: flex; flex-direction: column; align-items: center; margin: 10px 0;
        }
        .outer-ring {
            width: 90px; height: 90px; border: 3px solid #00d4ff; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
            background: radial-gradient(circle, rgba(255, 0, 127, 0.1) 0%, transparent 70%);
        }
        .wave-bar { width: 55px; height: 4px; background: #ff007f; box-shadow: 0 0 12px #ff007f; border-radius: 2px; }
        .status-label { font-size: 0.85rem; opacity: 0.7; margin-top: 8px; letter-spacing: 1px; }

        /* Cuadro de Cámara (Largo como en la foto) */
        .camera-container {
            width: 92%; margin: 0 auto; flex-grow: 1;
            border: 2px solid #00d4ff; border-radius: 20px;
            overflow: hidden; position: relative;
            background: #0a0a0a; box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* HUD - Esquinas de cámara */
        .corner { position: absolute; width: 25px; height: 25px; border: 2px solid #00d4ff; }
        .top-l { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .bot-r { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        /* Barra de Navegación (Iconos redondos) */
        .nav-bar {
            display: flex; justify-content: space-evenly; align-items: center;
            padding: 15px 0; width: 100%;
        }
        .btn-nav {
            width: 50px; height: 50px; border-radius: 50%;
            border: 2px solid #00d4ff; display: flex; align-items: center;
            justify-content: center; background: transparent; transition: 0.3s;
        }
        .btn-pink { border-color: #ff007f; box-shadow: 0 0 10px rgba(255, 0, 127, 0.3); }
        .btn-nav i { font-size: 26px; color: #fff; }

        /* Barra de Chat e Input */
        .footer-chat {
            width: 100%; padding: 0 15px 20px 15px;
        }
        .input-wrapper {
            background: #1a1a1a; border-radius: 15px;
            display: flex; align-items: center; padding: 5px 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-wrapper input {
            flex: 1; background: transparent; border: none; color: #fff;
            padding: 12px; outline: none; font-size: 16px;
        }
        .action-icons { display: flex; align-items: center; gap: 12px; }
        .icon-eye { color: #00d4ff; cursor: pointer; font-size: 28px; text-shadow: 0 0 10px #00d4ff; }
        .btn-send {
            background: #00d4ff; color: #000; border: none;
            padding: 8px 16px; border-radius: 10px; font-weight: bold;
            font-size: 0.8rem; text-transform: uppercase; cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="title">YUME</h1>
    </div>

    <div class="vision-circle">
        <div class="outer-ring">
            <div class="wave-bar"></div>
        </div>
        <div class="status-label">[ Escuchando ]</div>
    </div>

    <div class="camera-container">
        <div class="corner top-l"></div>
        <video id="v" autoplay playsinline></video>
        <div class="corner bot-r"></div>
    </div>

    <div class="nav-bar">
        <div class="btn-nav"><i class="material-icons-round">chat_bubble</i></div>
        <div class="btn-nav btn-pink" onclick="cam()"><i class="material-icons-round">visibility</i></div>
        <div class="btn-nav"><i class="material-icons-round">settings</i></div>
        <div class="btn-nav btn-pink"><i class="material-icons-round">power_settings_new</i></div>
    </div>

    <div class="footer-chat">
        <div class="input-wrapper">
            <input type="text" placeholder="¿Qué necesitas hoy?">
            <div class="action-icons">
                <i class="material-icons-round icon-eye" onclick="cam()">visibility</i>
                <button class="btn-send">ENVIAR</button>
            </div>
        </div>
    </div>

    <script>
        async function cam() {
            const v = document.getElementById('v');
            try {
                const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                v.srcObject = s;
            } catch (e) {
                alert("Padre, activa el permiso de cámara.");
            }
        }
        window.onload = cam;
    </script>
</body>
</html>
