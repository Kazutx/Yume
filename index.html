<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yume Interface</title>
    <style>
        /* Estilos base para que se vea igual a la captura */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Contenedor principal de textos */
        .main-container {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
        }

        /* Estilo exacto del título YUME */
        .title-yume {
            font-size: 70px;
            font-weight: bold;
            color: #ff007f;
            text-shadow: 0 0 25px #ff007f, 0 0 45px #ff007f;
            margin: 0;
            letter-spacing: 2px;
        }

        .subtitle-padre {
            font-size: 24px;
            margin: 0;
            opacity: 0.9;
        }

        /* Sistema Activo con brillo azul */
        .status-active {
            font-size: 32px;
            font-weight: bold;
            color: #00d4ff;
            text-shadow: 0 0 15px #00d4ff;
            margin: 10px 0;
            text-transform: uppercase;
        }

        .connection-info {
            color: #00ff88;
            font-size: 18px;
            margin: 0;
        }

        .thinking-text {
            color: #555555;
            font-size: 22px;
            margin-top: 40px;
        }

        /* Barra de entrada inferior exacta a la foto */
        .bottom-bar {
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            justify-content: center;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
        }

        .input-pill {
            width: 100%;
            max-width: 500px;
            background-color: #1a1a1a;
            border-radius: 40px;
            padding: 8px 10px 8px 25px;
            display: flex;
            align-items: center;
            border: 1px solid #333333;
        }

        .input-pill input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 18px;
            outline: none;
        }

        /* Botón ENVIAR cian redondeado */
        .btn-enviar {
            background-color: #00d4ff;
            color: #000000;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
            margin-left: 10px;
        }

    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="title-yume">YUME</h1>
        <p class="subtitle-padre">Hola, Padre.</p>
        
        <div class="status-active">SISTEMA ACTIVO</div>
        
        <p class="connection-info">[ Conectado página web ]</p>
        
        <div class="thinking-text">Pensando...</div>
    </div>

    <div class="bottom-bar">
        <div class="input-pill">
            <input type="text" placeholder="¿Qué necesitas hoy?">
            <button class="btn-enviar">ENVIAR</button>
        </div>
    </div>

</body>
</html>
