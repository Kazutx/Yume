<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YUME</title>
    <style>
        /* Fondo negro total y fuente limpia */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor central de textos */
        .main-display {
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
        }

        /* Título YUME en rosa neón */
        .title {
            font-size: 65px;
            font-weight: bold;
            color: #ff007f;
            text-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f;
            margin: 0;
            letter-spacing: 3px;
        }

        .greeting {
            font-size: 22px;
            margin: 0;
            opacity: 0.9;
        }

        /* Sistema Activo en azul neón */
        .status {
            font-size: 30px;
            font-weight: bold;
            color: #00d4ff;
            text-shadow: 0 0 15px #00d4ff;
            margin: 5px 0;
            text-transform: uppercase;
        }

        .web-info {
            color: #00ff88;
            font-size: 16px;
            margin: 0;
        }

        .thinking {
            color: #444444;
            font-size: 20px;
            margin-top: 40px;
        }

        /* Barra de chat inferior con botón ENVIAR cian */
        .input-area {
            width: 100%;
            padding: 20px;
            display: flex;
            justify-content: center;
            background: black;
        }

        .input-pill {
            width: 95%;
            max-width: 450px;
            background-color: #1a1a1a;
            border-radius: 35px;
            padding: 6px 6px 6px 20px;
            display: flex;
            align-items: center;
            border: 1px solid #2a2a2a;
        }

        .input-pill input {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 17px;
            outline: none;
        }

        .send-btn {
            background-color: #00d4ff;
            color: #000000;
            border: none;
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="main-display">
        <h1 class="title">YUME</h1>
        <p class="greeting">Hola, Padre.</p>
        
        <div class="status">SISTEMA ACTIVO</div>
        
        <p class="web-info">[ Conectado página web ]</p>
        
        <div class="thinking">Pensando...</div>
    </div>

    <div class="input-area">
        <div class="input-pill">
            <input type="text" placeholder="¿Qué necesitas hoy?">
            <button class="send-btn">ENVIAR</button>
        </div>
    </div>

</body>
</html>
