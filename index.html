<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YUME - Sistema Definitivo</title>
    <style>
        /* Fondo negro puro y texto blanco */
        body { 
            background-color: black; 
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            padding: 20px; 
            box-sizing: border-box; 
        }

        /* Contenedor de contenido superior centrado */
        .content-top { 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            flex-grow: 1; 
            width: 100%; 
        }

        /* YUME en neón rosa vibrante */
        h1 { 
            font-size: 3.8rem; 
            color: #ff007f; 
            text-shadow: 0 0 20px #ff007f, 0 0 40px #ff007f; 
            margin: 0; 
            text-transform: uppercase; 
            letter-spacing: 4px; 
        }

        /* Hola, Padre. justo debajo */
        .greeting { 
            font-size: 1.3rem; 
            opacity: 0.9; 
            margin: 10px 0 30px 0; 
        }

        /* SISTEMA ACTIVO en neón cian */
        h2 { 
            font-size: 1.8rem; 
            color: #00d4ff; 
            text-shadow: 0 0 15px #00d4ff; 
            margin: 0 0 25px 0; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }

        /* Estado de conexión: [ Conectado página web ] */
        .connection-status { 
            font-size: 0.95rem; 
            color: #00ff88; 
            margin-bottom: 40px; 
            letter-spacing: 1px;
        }

        /* Pensando... centrado con animación suave */
        .thinking { 
            font-size: 1.1rem; 
            opacity: 0.6; 
            margin: 0; 
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.8; }
            100% { opacity: 0.3; }
        }

        /* Área de chat inferior (Barra de entrada) */
        .chat-area { 
            width: 95%; 
            background: rgba(255, 255, 255, 0.07); 
            padding: 8px 15px; 
            border-radius: 25px; 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            display: flex; 
            align-items: center; 
            box-sizing: border-box; 
            margin-bottom: 20px; 
            backdrop-filter: blur(10px);
        }

        .chat-input { 
            flex-grow: 1; 
            background: transparent; 
            border: none; 
            color: white; 
            padding: 12px; 
            font-size: 1rem; 
            outline: none; 
        }

        /* Botón ENVIAR en cian */
        .send-button { 
            background: #00d4ff; 
            color: black; 
            border: none; 
            padding: 10px 22px; 
            border-radius: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 0.9rem; 
            text-transform: uppercase; 
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.4);
        }
    </style>
</head>
<body>

    <div class="content-top">
        <h1>YUME</h1>
        <p class="greeting">Hola, Padre.</p>
        
        <h2>SISTEMA ACTIVO</h2>
        
        <p class="connection-status">[ Conectado página web ]</p>
        
        <p class="thinking">Pensando...</p>
    </div>

    <div class="chat-area">
        <input type="text" class="chat-input" placeholder="¿Qué necesitas hoy?">
        <button class="send-button">ENVIAR</button>
    </div>

</body>
</html>
