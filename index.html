<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YUME FIX</title>
    <style>
        /* Bloqueamos el fondo negro total */
        html, body {
            background-color: #000 !important;
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            display: flex; flex-direction: column;
            font-family: sans-serif; overflow: hidden;
        }

        /* Contenedor de los textos (YUME, Sistema Activo, etc) */
        .top-content {
            flex: 1;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
        }

        .yume-logo { font-size: 65px; font-weight: bold; color: #ff007f; text-shadow: 0 0 20px #ff007f; margin: 0; }
        .padre { font-size: 22px; color: #fff; margin: 10px 0; }
        .active { font-size: 30px; font-weight: bold; color: #00d4ff; text-shadow: 0 0 15px #00d4ff; margin: 5px 0; }
        .web { color: #00ff88; font-size: 16px; }
        .think { color: #333; font-size: 20px; margin-top: 30px; }

        /* LA SOLUCIÓN: Subimos la barra mucho más arriba del borde inferior */
        .bottom-area {
            width: 100%;
            padding-bottom: 120px; /* ESPACIO GIGANTE ABAJO PARA QUE NO SE CORTE */
            display: flex; justify-content: center;
        }

        .pill {
            width: 92%; max-width: 400px;
            background: #1a1a1a; border-radius: 50px;
            display: flex; align-items: center;
            padding: 8px 8px 8px 20px; border: 1px solid #333;
        }

        input {
            flex: 1; background: transparent; border: none;
            color: #fff; font-size: 18px; outline: none;
        }

        .btn {
            background: #00d4ff; color: #000; border: none;
            padding: 12px 25px; border-radius: 30px;
            font-weight: bold; text-transform: uppercase; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="top-content">
        <h1 class="yume-logo">YUME</h1>
        <p class="padre">Hola, Padre.</p>
        <div class="active">SISTEMA ACTIVO</div>
        <p class="web">[ Conectado página web ]</p>
        <div class="think">Pensando...</div>
    </div>

    <div class="bottom-area">
        <div class="pill">
            <input type="text" placeholder="¿Qué necesitas hoy?">
            <button class="btn">ENVIAR</button>
        </div>
    </div>

</body>
</html>
